; ─────────────────────────────────────────────────────────────────────────────
; SEN66 Monitor — Phase 2
; Platform : Earle Philhower arduino-pico (via maxgerhardt fork)
; Board    : Raspberry Pi Pico W
; ─────────────────────────────────────────────────────────────────────────────
[env:pico_w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower

; 1 MB for LittleFS — leaves ~1 MB for firmware
board_build.filesystem_size = 1m

lib_deps =
    sensirion/Sensirion I2C SEN66
    bblanchon/ArduinoJson @ ^7

monitor_speed = 115200
monitor_filters = direct

; Upload filesystem image separately with:
;   pio run --target uploadfs
; (not needed for Phase 2 — all HTML is inline in firmware)